name: Build TemizWeb DNS

on:
  push:
    branches: [main]
    paths:
      - "dns/src/**"
      - "scripts/build_dns.py"
      - "scripts/check_dns.py"
      - ".github/workflows/build-dns.yml"
  schedule:
    - cron: "41 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temizweb-dns-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build DNS profiles
        run: python scripts/build_dns.py
      - name: Validate DNS profiles
        run: python scripts/check_dns.py
      - name: Commit refreshed outputs
        run: |
          if git diff --quiet -- dns/dist; then
            echo "No DNS changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dns/dist
          git commit -m "chore: refresh DNS profiles"
          git push
