name: Build TemizWeb Ultimate

on:
  push:
    branches: [main]
    paths:
      - "filters/src/**"
      - "scripts/**"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temizweb-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build merged list
        run: python scripts/build_filters.py
      - name: Validate
        run: python scripts/check_filters.py
      - name: Commit refreshed list
        run: |
          if git diff --quiet -- filters/dist/temizweb-main.txt; then
            echo "No list changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add filters/dist/temizweb-main.txt
          git commit -m "chore: refresh merged filter list"
          git push
