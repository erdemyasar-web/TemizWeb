name: Build TemizWeb Ultimate

on:
  push:
    branches: [main]
    paths:
      - "filters/src/**"
      - "scripts/build_filters.py"
      - "scripts/check_filters.py"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temizweb-filter-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build merged uBlock list
        run: python scripts/build_filters.py

      - name: Validate merged list
        run: python scripts/check_filters.py

      - name: Commit refreshed list
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- filters/dist/temizweb-main.txt; then
            echo "No filter changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add filters/dist/temizweb-main.txt
          git commit -m "chore: refresh merged uBlock list"

          # Another workflow may have updated main after this job started.
          # Rebase our generated commit before pushing.
          git pull --rebase origin main
          git push origin HEAD:main
